<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖Archana💖</title>
    <link rel="shortcut icon" href="./icon.png" type="image/x-icon">
    <link rel="stylesheet" href="main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
</head>

<body>
    <div id="drag-container">
        <div id="spin-container">
            <img src="images/a1.jpeg" alt="">
            <img src="images/a2.jpg" alt="">
            <img src="images/a4.jpg" alt="">
            <img src="images/a5.jpg" alt="">
            <img src="images/a6.jpg" alt="">
            <img src="images/a7.jpg" alt="">
            <img src="images/a8.jpg" alt="">
            <img src="images/a9.png" alt="">
            <img src="images/a10.jpg" alt="">
            <img src="images/a11.jpg" alt="">
            <img src="images/a12.jpg" alt="">
            <img src="images/a13.jpg" alt="">

            <p style="font-family:Georgia, 'Times New Roman', Times, serif;">Happy<span style=""> Birthday </span>Archana💖</p>
            <button class="button" onclick="confetti()"></button>
        </div>
        <div id="ground"></div>
    </div>

    <!-- ADD THIS: Canvas for animations -->
    <div id="canva">
        <canvas id="canvas"></canvas>
    </div>

    <audio id="birthday-audio" loop>
        <source src="bday.mp3" type="audio/mpeg">
    </audio>
    
    <script src='https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js'></script>
    <script src="main.js"></script>

    <script>
        window.onload = function () {
            var audio = document.getElementById("birthday-audio");
            
            // Try to play audio
            var playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise
                    .then(function () {
                        console.log('Audio is playing');
                    })
                    .catch(function (error) {
                        console.log('Audio playback failed:', error);
                        // Add click to play fallback
                        document.body.addEventListener('click', function () {
                            audio.play();
                        });
                    });
            }

            // Animations
            const canvas = document.getElementById("canvas");
            if (!canvas) {
                console.error('Canvas element not found');
                return;
            }

            const ctx = canvas.getContext("2d");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // ... rest of your animation code
        };
    </script>
</body>

</html>
